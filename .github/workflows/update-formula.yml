name: Update Homebrew Formula

on:
  push:
    tags:
      - 'v*'

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI availability
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Waiting for gemstack $VERSION on PyPI..."
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/gemstack/$VERSION/json" > /dev/null 2>&1; then
              echo "Package available on PyPI"
              exit 0
            fi
            echo "Attempt $i/30 — waiting 10s..."
            sleep 10
          done
          echo "::error::Package not found on PyPI after 5 minutes"
          exit 1

      - name: Download sdist and compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Fetch PyPI metadata once and reuse
          PYPI_JSON=$(curl -sf "https://pypi.org/pypi/gemstack/$VERSION/json")
          URL=$(echo "$PYPI_JSON" | python3 -c "import sys,json; urls=json.load(sys.stdin)['urls']; print(next(u['url'] for u in urls if u['packagetype']=='sdist'))")
          echo "Downloading $URL"
          curl -fSL "$URL" -o gemstack.tar.gz
          SHA256=$(sha256sum gemstack.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA256"

      - name: Update Formula/gemstack.rb
        run: |
          URL="${{ steps.sha.outputs.url }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/gemstack.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/gemstack.rb
          echo "Updated Formula/gemstack.rb:"
          cat Formula/gemstack.rb

      - name: Commit formula update
        run: |
          BRANCH="chore/update-formula-v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Formula/gemstack.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update Homebrew formula to v${{ steps.version.outputs.version }}"
          git push origin "$BRANCH" --force

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="chore/update-formula-v${VERSION}"
          # Check if PR already exists for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $BRANCH"
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: update Homebrew formula to v${VERSION}" \
              --body "Automated PR to update the Homebrew formula for gemstack v${VERSION}.

          - Updated sdist URL and SHA256 hash from PyPI" \
              --label "automated" || echo "::warning::PR creation failed — push succeeded, create PR manually"
          fi
