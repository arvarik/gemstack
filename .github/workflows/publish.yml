name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v0.1.0, v1.0.0, etc.)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi  # GitHub environment with PyPI OIDC trust
    permissions:
      id-token: write       # Required for OIDC token request
      contents: read
      attestations: write   # Required for SLSA provenance

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Generate SLSA provenance attestation
      - name: Generate attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      # Publish to PyPI using Trusted Publishing (no API token needed)
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No 'password' or 'api-token' needed — OIDC handles auth
